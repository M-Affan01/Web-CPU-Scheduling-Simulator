<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Vibrant Glowing Neon Gradients -->
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#0891b2" />
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#7e22ce" />
    </linearGradient>
    <linearGradient id="roseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fb7185" />
      <stop offset="100%" stop-color="#be123c" />
    </linearGradient>
    <linearGradient id="yellowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
    
    <!-- Neon Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Layer -->
  <circle cx="50" cy="50" r="48" fill="#000000" stroke="#1e293b" stroke-width="1.5"/>

  <!-- Scheduling Gantt Ring (Concentric Queue Tracks) -->
  <!-- Process Queue 1 (Cyan) -->
  <path d="M 50,12 A 38,38 0 0,1 88,50" fill="none" stroke="url(#cyanGrad)" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Process Queue 2 (Purple) -->
  <path d="M 88,50 A 38,38 0 0,1 50,88" fill="none" stroke="url(#purpleGrad)" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Process Queue 3 (Rose) -->
  <path d="M 50,88 A 38,38 0 0,1 12,50" fill="none" stroke="url(#roseGrad)" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Process Queue 4 (Yellow/Idle) -->
  <path d="M 12,50 A 38,38 0 0,1 50,12" fill="none" stroke="url(#yellowGrad)" stroke-dasharray="4 3" stroke-width="2" stroke-linecap="round" opacity="0.8"/>

  <!-- CPU Microprocessor Outline -->
  <rect x="28" y="28" width="44" height="44" rx="6" fill="#0b0f19" stroke="url(#cyanGrad)" stroke-width="2" filter="url(#glow)"/>

  <!-- Microchip Contacts / Pins representing bus channels -->
  <g stroke="#22d3ee" stroke-width="1.5" stroke-linecap="round">
    <!-- Top Pins -->
    <line x1="38" y1="28" x2="38" y2="23"/>
    <line x1="50" y1="28" x2="50" y2="21"/>
    <line x1="62" y1="28" x2="62" y2="23"/>
    <!-- Bottom Pins -->
    <line x1="38" y1="72" x2="38" y2="77"/>
    <line x1="50" y1="72" x2="50" y2="79"/>
    <line x1="62" y1="72" x2="62" y2="77"/>
    <!-- Left Pins -->
    <line x1="28" y1="38" x2="23" y2="38"/>
    <line x1="28" y1="50" x2="21" y2="50"/>
    <line x1="28" y1="62" x2="23" y2="62"/>
    <!-- Right Pins -->
    <line x1="72" y1="38" x2="77" y2="38"/>
    <line x1="72" y1="50" x2="79" y2="50"/>
    <line x1="72" y1="62" x2="77" y2="62"/>
  </g>

  <!-- Silicon Die Core (Inner Processor) -->
  <rect x="36" y="36" width="28" height="28" rx="3" fill="#0f172a" stroke="url(#purpleGrad)" stroke-width="1.5"/>

  <!-- CPU Core Frequency / Execution Waveform inside CPU -->
  <path d="M 40,50 L 44,50 L 47,41 L 50,59 L 53,46 L 56,50 L 60,50" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- Glowing Task Dispatcher Dots -->
  <circle cx="50" cy="12" r="3.5" fill="#22d3ee" filter="url(#glow)"/>
  <circle cx="88" cy="50" r="3.5" fill="#a855f7" filter="url(#glow)"/>
  <circle cx="50" cy="88" r="3.5" fill="#fb7185" filter="url(#glow)"/>
  <circle cx="12" cy="50" r="3" fill="#fbbf24"/>
</svg>
